<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>口语节拍校准器 Demo</title>
  <style>
    :root {
      --bg: #08111f;
      --card: rgba(255, 255, 255, 0.08);
      --card2: rgba(255, 255, 255, 0.13);
      --text: #f8fafc;
      --muted: #a7b3c6;
      --accent: #5eead4;
      --accent2: #fb7185;
      --warn: #fbbf24;
      --good: #86efac;
      --border: rgba(255, 255, 255, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(94, 234, 212, 0.25), transparent 30rem),
        radial-gradient(circle at 85% 20%, rgba(251, 113, 133, 0.22), transparent 28rem),
        linear-gradient(180deg, #08111f, #111827);
      line-height: 1.7;
      padding: 22px;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero {
      padding: clamp(28px, 6vw, 70px);
      border: 1px solid var(--border);
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      box-shadow: 0 28px 80px rgba(0,0,0,0.35);
    }

    .tag {
      display: inline-block;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--accent);
      background: rgba(94,234,212,0.08);
      font-size: 14px;
      font-weight: 800;
    }

    h1 {
      margin-top: 42px;
      font-size: clamp(42px, 8vw, 88px);
      line-height: 0.95;
      letter-spacing: -0.08em;
      font-weight: 950;
    }

    .subtitle {
      max-width: 780px;
      margin-top: 22px;
      color: var(--muted);
      font-size: 18px;
    }

    .notice {
      margin-top: 22px;
      padding: 16px;
      border: 1px solid rgba(251, 191, 36, 0.35);
      border-radius: 18px;
      color: var(--muted);
      background: rgba(251, 191, 36, 0.08);
    }

    .notice.ok {
      border-color: rgba(94, 234, 212, 0.35);
      background: rgba(94, 234, 212, 0.08);
    }

    .notice strong {
      color: var(--warn);
    }

    .notice.ok strong {
      color: var(--accent);
    }

    section {
      margin-top: 26px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
    }

    .card {
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 26px;
      background: var(--card);
      box-shadow: 0 18px 50px rgba(0,0,0,0.22);
      backdrop-filter: blur(16px);
    }

    h2 {
      margin-bottom: 12px;
      font-size: clamp(26px, 4vw, 38px);
      line-height: 1.15;
      letter-spacing: -0.04em;
    }

    h3 {
      margin-bottom: 8px;
      font-size: 20px;
    }

    p {
      color: var(--muted);
    }

    .sentence-box {
      margin-top: 18px;
      padding: 18px;
      border: 1px solid rgba(94, 234, 212, 0.32);
      border-radius: 20px;
      background: rgba(94, 234, 212, 0.08);
    }

    .sentence {
      color: var(--text);
      font-size: clamp(22px, 4vw, 32px);
      line-height: 1.35;
      font-weight: 900;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      min-height: 48px;
      padding: 0 18px;
      border: 0;
      border-radius: 15px;
      color: #06130f;
      background: var(--accent);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    button.secondary {
      color: var(--text);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.1);
    }

    button.danger {
      color: #170207;
      background: var(--accent2);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .timer {
      margin-top: 14px;
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 30px;
      font-weight: 900;
    }

    .wave-wrap {
      overflow: hidden;
      height: 170px;
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        repeating-linear-gradient(90deg, transparent 0 24px, rgba(255,255,255,0.05) 24px 25px);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .profile {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .metric {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
    }

    .metric .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
